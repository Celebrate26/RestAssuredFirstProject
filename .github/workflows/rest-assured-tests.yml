name: Rest Assured API Testing
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    workflow_dispatch:
  env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
    test:
      runs-on: ubuntu-latest
      timeout-minutes: 30
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
            - mame: check node version
              run: node -v
                - name: Set up Java 21
                  uses: actions/setup-java@v4
                  with:
                    java-version: '21'
                    distribution: 'temurin'
                    cache: maven



