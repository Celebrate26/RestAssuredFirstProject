name: Rest Assured API Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Create testng.xml dynamically
        run: |
          cat <<EOF > testng.xml
          <!DOCTYPE suite SYSTEM "https://testng.org/testng-1.0.dtd">
          <suite name="API Suite" parallel="methods" thread-count="2">
            <listeners>
              <listener class-name="io.qameta.allure.testng.AllureTestNg"/>
            </listeners>
            <test name="API Tests">
              <classes>
                <class name="UserRegistration.UserRegistration"/>
              </classes>
            </test>
          </suite>
          EOF

      - name: Build and Run Tests
        run: mvn clean test -Dsurefire.suiteXmlFiles=testng.xml
        continue-on-error: true

      - name: Upload TestNG Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testng-reports
          path: target/surefire-reports/
          retention-days: 5

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 5

